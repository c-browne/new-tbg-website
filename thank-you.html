<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Participation Request Received | The Buckler Group</title>

<style>
body{
  margin:0;
  background:#050608;
  color:#ffffff;
  font-family:Arial,sans-serif;
}

.thank-you-wrapper{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:40px;
}

.thank-you-card{
  max-width:760px;
  border-left:2px solid #c7a453;
  padding-left:34px;
}

.kicker{
  color:#c7a453;
  text-transform:uppercase;
  letter-spacing:.18em;
  font-size:12px;
  margin-bottom:22px;
}

h1{
  font-family:Georgia,serif;
  font-size:clamp(42px,6vw,76px);
  font-weight:400;
  line-height:1;
  margin:0 0 28px;
}

p{
  color:#cfcfcf;
  font-size:18px;
  line-height:1.7;
  max-width:620px;
  margin-bottom:36px;
}

a{
  display:inline-block;
  color:#c7a453;
  border:1px solid #c7a453;
  padding:16px 24px;
  text-decoration:none;
  text-transform:uppercase;
  letter-spacing:.14em;
  font-size:12px;
  transition:.25s ease;
}

a:hover{
  background:#c7a453;
  color:#050608;
}

@media(max-width:700px){
  .thank-you-card{
    padding-left:22px;
  }
}
</style>
</head>

<body>

<main class="thank-you-wrapper">
  <section class="thank-you-card">
    <p class="kicker">The Buckler Group</p>

    <h1>Participation Request Received</h1>

    <p>
      Thank you for your interest in the 2026 Caribbean Entitlement & Hospitality Strategic Sessions.
      Your request has been received and will be reviewed by The Buckler Group.
    </p>

    <a href="index.html">Return to Homepage</a>
  </section>
</main>

</body>
</html>
